# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/newscred_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
jwt.secret=${JWT_SECRET:mySuperSecretKeyForNewsCredThatIsAtLeast32CharactersLong123}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server
server.port=${PORT:8080}
server.servlet.context-path=/

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:philiptesimbo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_email_password_here}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# App URL for verification links
app.frontend.url=${FRONTEND_URL:http://localhost:19006}

# Logging
logging.level.com.NewsCred.backend=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.mail=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Rate Limiting
rate.limit.default.requests=${RATE_LIMIT_DEFAULT:10}
rate.limit.premium.requests=${RATE_LIMIT_PREMIUM:50}
rate.limit.window.seconds=${RATE_LIMIT_WINDOW:60}

# Cache Configuration
spring.cache.type=simple
spring.cache.cache-names=sources,factChecks,users
spring.cache.simple.expiration=3600

# Security
spring.security.user.name=${ADMIN_USER:admin}
spring.security.user.password=${ADMIN_PASS:admin123}