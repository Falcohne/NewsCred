# ============================================
# NEWS CRED - APPLICATION PROPERTIES TEMPLATE
# ============================================
# Copy this file to application.properties
# and update with your local values
# ============================================

# DATABASE CONFIGURATION
# -----------------------
# PostgreSQL connection details
spring.datasource.url=jdbc:postgresql://localhost:5432/newscred
spring.datasource.username=postgres
spring.datasource.password=YOUR_POSTGRES_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA CONFIGURATION
# ------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT SECURITY
# -------------
# Generate a secure key - at least 256 bits (32+ characters)
jwt.secret=YOUR_SECURE_JWT_SECRET_KEY_HERE_32_PLUS_CHARS
jwt.expiration=86400000

# SERVER
# -------
server.port=8080

# CORS
# -----
# Add your mobile app IP/ports
cors.allowed-origins=http://localhost:19006,http://192.168.1.100:19006

# RATE LIMITING
# --------------
rate.limit.free=10
rate.limit.premium=50

# LOGGING
# --------
logging.level.com.NewsCred.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# ============================================
# TEAM SETUP INSTRUCTIONS:
# 1. Install PostgreSQL locally
# 2. Create database: CREATE DATABASE newscred;
# 3. Copy this file to application.properties
# 4. Update YOUR_POSTGRES_PASSWORD
# 5. Generate a secure JWT secret
# 6. Run: mvn spring-boot:run
# ============================================